services:
  serena:
    image: ghcr.io/oraios/serena:latest
    container_name: serena
    environment:
      TZ: America/New_York
      SERENA_DOCKER: "1"
      LOCAL_PROJECT_PATH: ${LOCAL_PROJECT_PATH}
    ports:
      - target: 9121
        published: 9121
        protocol: tcp
        mode: host
    volumes:
      - type: bind
        source: ./serena-config.yml
        target: /workspaces/serena/serena_config.docker.yml
      - type: bind
        source: ${LOCAL_PROJECT_PATH}
        target: /workspaces/active-project
    command:
      - serena
      - start-mcp-server
      - --log-level
      - DEBUG
      - --transport
      - streamable-http
      - --port
      - "9121"
      - --host
      - 0.0.0.0
      - --project
      - /workspaces/active-project
      - --context
      - claude-code
    restart: unless-stopped
